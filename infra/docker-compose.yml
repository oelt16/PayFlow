# PayFlow local dev stack (spec section 10.1). From repo root:
#   docker compose -f infra/docker-compose.yml up --build
name: payflow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-payflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-payflow}
      POSTGRES_DB: ${POSTGRES_DB:-payflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-payflow} -d ${POSTGRES_DB:-payflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Official ASF image (same family as Testcontainers: apache/kafka). Pinned; see https://hub.docker.com/r/apache/kafka/tags
  kafka:
    image: apache/kafka:3.9.2
    hostname: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: payflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  payment-service:
    build:
      context: ../backend
      dockerfile: payment-service/Dockerfile
    ports:
      - "${PAYMENT_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payflow}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  merchant-service:
    build:
      context: ../backend
      dockerfile: merchant-service/Dockerfile
    ports:
      - "${MERCHANT_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payflow}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payflow}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  webhook-service:
    build:
      context: ../backend
      dockerfile: webhook-service/Dockerfile
    ports:
      - "${WEBHOOK_SERVICE_PORT:-8083}:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-payflow}?currentSchema=webhooks
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-payflow}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-payflow}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  notification-service:
    build:
      context: ../backend
      dockerfile: notification-service/Dockerfile
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYFLOW_WEBHOOK_DISPATCH_BASE_URL: http://webhook-service:8083
    depends_on:
      kafka:
        condition: service_healthy
      webhook-service:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - payment-service
      - merchant-service
      - webhook-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  kafka_data:

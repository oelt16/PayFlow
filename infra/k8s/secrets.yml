# Replace stringData before applying in a real cluster. Deployment images must match CI:
# ghcr.io/<lowercase github.repository>/<service>:latest (e.g. ghcr.io/myorg/payflow/payment-service:latest)
---
apiVersion: v1
kind: Secret
metadata:
  name: payflow-db
  namespace: payflow
  labels:
    app.kubernetes.io/part-of: payflow
type: Opaque
stringData:
  POSTGRES_USER: payflow
  POSTGRES_PASSWORD: change-me-in-production
  POSTGRES_DB: payflow

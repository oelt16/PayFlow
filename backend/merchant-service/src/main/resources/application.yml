server:
  port: 8082

spring:
  application:
    name: merchant-service
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow
    username: payflow
    password: payflow
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: merchants
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    schemas: merchants
    default-schema: merchants
    create-schemas: true

payflow:
  outbox:
    poll-interval-ms: 500
    batch-size: 100
    topic: merchant.events
    send-timeout-seconds: 30

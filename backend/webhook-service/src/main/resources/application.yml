server:
  port: 8083

spring:
  application:
    name: webhook-service
  kafka:
    bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5432/payflow?currentSchema=webhooks
    username: payflow
    password: payflow
    hikari:
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS merchants
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: webhooks
  flyway:
    enabled: true
    schemas: webhooks
    default-schema: webhooks
    locations: classpath:db/migration

payflow:
  webhook:
    max-endpoints-per-merchant: 5
    signature-header: Payflow-Signature
    retry-poll-ms: 5000
  kafka:
    dlq-topic: webhook.dlq
  internal:
    dispatch-enabled: true

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

  # Docker embedded DNS; variable proxy_pass resolves backends at request time (not at nginx -t / startup).
  # set $backend must run before rewrite ... break (both are rewrite-module; break skips later directives in the block).
  resolver 127.0.0.11 valid=10s ipv6=off;

  server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location ~ ^/api/v1/payments {
      set $backend http://payment-service:8081;
      rewrite ^/api(.*)$ $1 break;
      proxy_pass $backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location ~ ^/api/v1/merchants {
      set $backend http://merchant-service:8082;
      rewrite ^/api(.*)$ $1 break;
      proxy_pass $backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location ~ ^/api/v1/webhooks {
      set $backend http://webhook-service:8083;
      rewrite ^/api(.*)$ $1 break;
      proxy_pass $backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Authorization $http_authorization;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
